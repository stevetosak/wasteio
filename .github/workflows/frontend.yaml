name: Build & Deploy Frontend

on:
  push:
    branches: ["master"]
    paths:
      - "wasteio-frontend/**"
      - ".github/workflows/frontend.yaml"

env:
  IMAGE_VERSION_PATTERN: "alpha-${{ github.sha }}"
  DOCKERHUB_NAMESPACE: "stevetosak"
  IMAGE_NAME: "wasteio-frontend"

jobs:
  build-push:
    runs-on: ubuntu-22.04
    outputs:
      IMAGE_VERSION: ${{ steps.image_tags.outputs.IMAGE_VERSION }}
      IMAGE_LATEST: ${{ steps.image_tags.outputs.IMAGE_LATEST }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tags
        id: image_tags
        run: |
          IMAGE_LATEST="${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest"
          IMAGE_VERSION="${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_VERSION_PATTERN }}"
          echo "IMAGE_LATEST=$IMAGE_LATEST" >> $GITHUB_OUTPUT
          echo "IMAGE_VERSION=$IMAGE_VERSION" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./wasteio-frontend
          push: true
          tags: |
            ${{ steps.image_tags.outputs.IMAGE_LATEST }}
            ${{ steps.image_tags.outputs.IMAGE_VERSION }}

  deploy:
    needs: build-push
    runs-on: ubuntu-22.04
    steps:
      - uses: stevetosak/hetzner-cloud-infra/.github/actions/kustomize-deploy@main
        with:
          infra-repo: stevetosak/${{ vars.INFRA_REPO_NAME }}
          infra-repo-token: ${{ secrets.INFRA_REPO_TOKEN }}
          overlay-dir: projects/wasteio/frontend/manifests/overlays/dev
          image-tag: ${{ needs.build-push.outputs.IMAGE_VERSION }}
          commit-message: "chore(wasteio): update frontend image to ${{ github.sha }}"
