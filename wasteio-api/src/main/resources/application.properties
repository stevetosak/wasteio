spring.application.name=wasteio-api

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5433/wasteio
spring.datasource.username=wasteio_user
spring.datasource.password=wasteio_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# MQTT Configuration
mqtt.broker.url=tcp://localhost:1883
mqtt.client.id=wasteio-backend
mqtt.topic.telemetry=waste/containers/+/telemetry