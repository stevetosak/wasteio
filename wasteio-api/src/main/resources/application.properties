spring.application.name=wasteio-api

#PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/wasteio
spring.datasource.username=nadica
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

#JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
#MQTT Configuration
mqtt.broker.url=tcp://localhost:1883
mqtt.client.id=wasteio-backend
mqtt.topic.telemetry=waste/containers/+/telemetry