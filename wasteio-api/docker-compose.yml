services:
  postgres:
    image: postgres:16-alpine
    container_name: wasteio-postgres
    environment:
      POSTGRES_DB: wasteio
      POSTGRES_USER: wasteio_user
      POSTGRES_PASSWORD: wasteio_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wasteio_user -d wasteio"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: